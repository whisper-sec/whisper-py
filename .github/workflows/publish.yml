name: Publish to PyPI
on:
  release:
    types: [published]
permissions:
  contents: read
jobs:
  pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install build
      - run: python -m build
      # Publishes when the PYPI_TOKEN secret is set (a PyPI API token). Runs only on a
      # published GitHub release, so there is no spurious failure before the token exists.
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
